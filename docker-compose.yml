version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: resume_postgres
    environment:
      POSTGRES_DB: resume_builder
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: resume_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: resume_api
    environment:
      APP_ENV: production
      API_PREFIX: /api/v1
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: http://localhost:3000
      DATABASE_URL: postgresql+psycopg2://resume_user:resume_password@postgres:5432/resume_builder
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: resume_jobs
      STORAGE_DIR: /app/data/storage
      JWT_SECRET: change-me-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRY_MINUTES: 1440
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-2}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-60}
      GENERATION_TEMPERATURE: ${GENERATION_TEMPERATURE:-0.35}
      GENERATION_MAX_TOKENS: ${GENERATION_MAX_TOKENS:-1400}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data:/app/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: resume_worker
    environment:
      DATABASE_URL: postgresql+psycopg2://resume_user:resume_password@postgres:5432/resume_builder
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: resume_jobs
      STORAGE_DIR: /app/data/storage
      JWT_SECRET: change-me-in-production
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-2}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-60}
      GENERATION_TEMPERATURE: ${GENERATION_TEMPERATURE:-0.35}
      GENERATION_MAX_TOKENS: ${GENERATION_MAX_TOKENS:-1400}
    depends_on:
      - api
      - redis
      - postgres
    volumes:
      - ./data:/app/data

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: resume_web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
